[knuckles]

[knuckles.core.format]
knuckles-context-threshold = 30
knuckles-context-recent = 10
knuckles-prompts = "__project__/prompts"

[knuckles.core.tools]
run-timeout-ms = 30000
run-after-edit = "slug test --dir ."

[knuckles.github.auth]
github-api-url = "https://api.github.com"
github-url = "https://github.com"
github-token = ""

[knuckles.github.repo]
knuckles-workspace = "/tmp/knuckles"

[knuckles.agent]
knuckles-max-turns = 50
knuckles-context = 30
knuckles-model = "qwen3-coder:480b-cloud"
knuckles-slug-spec = "__project__/data/SLUG.ai"
knuckles-manifest = "__project__/data/MANIFEST.ai"

[knuckles.store]
knuckles-db = "__project__/data/knuckles.db"

[slug.log]
log-file = "__project__/knuckles.log"
level = "info"
level__slug_acp_runtime = "debug"
