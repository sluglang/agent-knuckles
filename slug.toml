[knuckles]

[knuckles.core.format]
knuckles_context_threshold = 30
knuckles_context_recent = 10
knuckles_prompts = "prompts"

[knuckles.core.tools]
run_timeout_ms = 30000
run_after_edit = "slug test --dir ."

[knuckles.github.auth]
github_api_url = "https://api.github.com"
github_url = "https://github.com"
github_token = ""

[knuckles.github.repo]
knuckles_workspace = "/tmp/knuckles"

[knuckles.agent]
knuckles_max_turns = 50
knuckles_context = 30
knuckles_model = "qwen3-coder:480b-cloud"
knuckles_slug_spec = "/Users/evan/projects/slug/agentKnuckles/data/SLUG.ai"
knuckles_manifest = "/Users/evan/projects/slug/agentKnuckles/data/MANIFEST.ai"

[knuckles.store]
knuckles_db = "/Users/evan/projects/slug/agentKnuckles/data/knuckles.db"
